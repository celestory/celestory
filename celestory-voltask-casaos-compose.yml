name: celestory-voltask

services:
  frontend:
    image: celestory/frontend:latest
    container_name: celestory-frontend
    environment:
      CLOUD_API_URL: http://api
      ACCOUNT_API_URL: http://auth
    ports:
      - target: 80
        published: "${FRONTEND_PORT:-3000}"
        protocol: tcp
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "1"
    depends_on:
      - auth

  hub:
    image: celestory/hub:latest
    container_name: celestory-hub
    environment:
      AUTH_ORIGIN: http://auth
      AUTH_CLIENT_ID: ${AUTH_CLIENT_ID}
      AUTH_CLIENT_SECRET: ${AUTH_CLIENT_SECRET}
      AUTH_JWKS_URI: http://auth/.well-known/jwks.json
      AUTH_AUDIENCE: ${AUTH_AUDIENCE}
      DB_VOLTASK_URL: postgres://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST}/voltask
      DB_HUB_URL: postgres://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST}/hub
      AUTHORITY_SERVER_URL: https://celestory-hub-575193114089.europe-west1.run.app
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SUPER_ADMIN: false
      AUTH_AUTHORITY_SECRET: ${AUTH_AUTHORITY_SECRET}
      PORT: 3000
      ORIGIN: ${HUB_ORIGIN:-http://localhost:3001}
    ports:
      - target: 3000
        published: "${HUB_PORT:-3001}"
        protocol: tcp
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "1"
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy

  api:
    image: celestory/api:latest
    container_name: celestory-api
    volumes:
      - type: bind
        source: /DATA/AppData/celestory/project_files
        target: /app/projectFiles
    environment:
      PORT: 80
      SELF_HOSTED: true
      API_LOGGING: true
      STORAGE_SOLUTION: filesystem
      AUTH_DOMAIN: http://auth
      AUTH_CLIENT_ID: ${AUTH_CLIENT_ID}
      AUTH_CLIENT_SECRET: ${AUTH_CLIENT_SECRET}
      AUTH_JWKS_URI: http://auth/.well-known/jwks.json
      AUTH_AUDIENCE: ${AUTH_AUDIENCE}
      GENERATOR_URL: http://generator
      ORIGIN: ${ORIGIN:-http://localhost:3000}/api
      DB_URL: postgres://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST}/celestory
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "1"
    depends_on:
      db:
        condition: service_healthy

  generator:
    image: celestory/generator:latest
    container_name: celestory-generator
    volumes:
      - type: bind
        source: /DATA/AppData/celestory/project_files
        target: /usr/src/app/projectFiles
    environment:
      PORT: 80
      API_LOG: true
      STORAGE_SOLUTION: filesystem
      PROJECT_FILES_PATH: /usr/src/app/projectFiles
      PROJECT_FILES_PREFIX: /api/filesystem/
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "1"
    depends_on:
      - api

  auth:
    image: celestory/auth:latest
    container_name: celestory-auth
    environment:
      PORT: 80
      API_ENV: true
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: auth
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      API_ACCESS_TOKEN_TTL: 604800
      API_REFRESH_TOKEN_TTL: 1209600
      USE_SELF_HOSTED_CLIENT: true
      API_AUTHORITY_SECRET: ${AUTH_AUTHORITY_SECRET}
      API_OAUTH_ISSUER: celestory_auth
      SELF_HOSTED_REDIRECT_URI: ${ORIGIN:-http://localhost:3000}/callback
      GENERATE_KEYS: true
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "1"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:80/', (res) => { if (res.statusCode === 200) process.exit(0); else process.exit(1); }).on('error', (e) => { process.exit(1); })"]
      interval: 10s
      timeout: 5s
      retries: 5

  voltask:
    image: celestory/voltask:latest
    container_name: voltask
    restart: unless-stopped
    ports:
      - target: ${VOLTASK_PORT:-3002}
        published: "${VOLTASK_PORT:-3002}"
        protocol: tcp
    environment:
      PORT: ${VOLTASK_PORT:-3002}
      HOST_URL: ${VOLTASK_HOST_URL}
      VOLTASK_URL: http://voltask:${VOLTASK_PORT:-3002}
      WEBHOOK_URL: ${VOLTASK_WEBHOOK_URL}
      DATABASE_URL: postgresql://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST}:5432/voltask?schema=voltask
      ORCHESTRATOR_URL: http://orchestrator:${VOLTASK_ORCHESTRATOR_PORT:-3003}
      CELESTORY_AUTH_URL: ${CELESTORY_AUTH_URL}
      PLUGINS_BUN_URL: http://plugins-bun:${VOLTASK_PLUGINS_BUN_PORT:-3004}
      PLUGINS_DENO_URL: http://plugins-deno:${VOLTASK_PLUGINS_DENO_PORT:-3005}
      CELESTORY_AUTH_CLIENT_ID: ${CELESTORY_AUTH_CLIENT_ID}
      CELESTORY_AUTH_CLIENT_SECRET: ${CELESTORY_AUTH_CLIENT_SECRET}
      CELESTORY_AUTH_AUDIENCE: ${CELESTORY_AUTH_AUDIENCE}
      LICENSE_API_URL: http://hub:3000
      PREMISE: on-premise
      PREMISE_USER_EMAIL: ${VOLTASK_PREMISE_USER_EMAIL}
      PREMISE_USER_PASSWORD: ${VOLTASK_PREMISE_USER_PASSWORD}
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "1"
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
      plugins-deno:
        condition: service_healthy
      plugins-bun:
        condition: service_healthy
      orchestrator:
        condition: service_healthy

  orchestrator:
    image: celestory/voltask-orchestrator:latest
    container_name: orchestrator
    restart: unless-stopped
    environment:
      PORT: ${VOLTASK_ORCHESTRATOR_PORT:-3003}
      DATABASE_URL: postgresql://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST}:5432/orchestrator?sslmode=disable
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "1"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${VOLTASK_ORCHESTRATOR_PORT:-3003}/statements"]
      retries: 3
      timeout: 60s
      interval: 10s
      start_period: 10s
      start_interval: 10s

  plugins-bun:
    image: celestory/voltask-plugins-bun:latest
    container_name: plugins-bun
    restart: unless-stopped
    environment:
      PORT: ${VOLTASK_PLUGINS_BUN_PORT:-3004}
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${VOLTASK_PLUGINS_BUN_PORT:-3004}/imap"]
      retries: 3
      timeout: 60s
      interval: 10s
      start_period: 10s
      start_interval: 10s

  plugins-deno:
    image: celestory/voltask-plugins-deno:latest
    container_name: plugins-deno
    restart: unless-stopped
    environment:
      PORT: ${VOLTASK_PLUGINS_DENO_PORT:-3005}
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${VOLTASK_PLUGINS_DENO_PORT:-3005}/deno"]
      retries: 3
      timeout: 60s
      interval: 10s
      start_period: 10s
      start_interval: 10s

  db:
    image: postgres:16-alpine
    container_name: celestory-db
    restart: always
    ports:
      - target: 5432
        published: "${DB_PORT:-5432}"
        protocol: tcp
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: auth,celestory,hub,voltask,orchestrator
    volumes:
      - type: bind
        source: ./volumes/db-scripts
        target: /docker-entrypoint-initdb.d
      - type: bind
        source: /DATA/AppData/celestory/postgres_data
        target: /var/lib/postgresql/data
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "1"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p 5432 -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

x-casaos:
  architectures:
    - amd64
    - arm64
  main: frontend
  port_map: "3000"
  description:
    en_us: Self-hosted Celestory suite with Voltask automation engine.
  author: Celestory
  developer: Celestory
  icon: https://storage.googleapis.com/voltask-assets/celestory.png
  thumbnail: https://storage.googleapis.com/voltask-assets/celestory.png
  title:
    en_us: Celestory and Voltask
  category: Productivity